syntax = "proto3";

package pos;

service POS {
  rpc GetProductPrice (GetProductPriceRequest) returns (GetProductPriceResponse);
  rpc UpdateProductPrice (UpdateProductPriceRequest) returns (UpdateProductPriceResponse);
  rpc NotifyPeersToUpdatePrice (UpdateProductPriceRequest) returns (UpdateProductPriceResponse);
  //
  rpc BuyProduct (BuyProductRequest) returns (BuyProductResponse);
  //
  rpc RequestVote (RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries (AppendEntriesRequest) returns (AppendEntriesResponse);
}

message GetProductPriceRequest {
  int32 product_id = 1;
}

message GetProductPriceResponse {
  int32 product_id = 1;
  string name = 2;
  float price = 3;
  string message = 4;  // Error message if product is not found
}

message UpdateProductPriceRequest {
  int32 product_id = 1;
  float new_price = 2;
}

message UpdateProductPriceResponse {
  bool success = 1;
  string message = 2;  // Success or error message
}

//
message BuyProductRequest {
  int32 product_id = 1;
  int32 quantity = 2;
  string node_id_requesting = 3;
}

message BuyProductResponse {
  bool success = 1;
  string message = 2;  // Success or error message
  float total_price = 3; // Total price for the purchase
}

// --- Raft leader election RPCs ---
message RequestVoteRequest {
  int32 term = 1;
  string candidate_id = 2;
}

message RequestVoteResponse {
  int32 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  int32 term = 1;
  string leader_id = 2;
}

message AppendEntriesResponse {
  int32 term = 1;
  bool success = 2;
}
