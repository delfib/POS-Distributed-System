syntax = "proto3";

package pos;

service POS {
  rpc GetProductPrice (GetProductPriceRequest) returns (GetProductPriceResponse);
  rpc UpdateProductPrice (UpdateProductPriceRequest) returns (UpdateProductPriceResponse);
  rpc NotifyPeersToUpdatePrice (UpdateProductPriceRequest) returns (UpdateProductPriceResponse);
  rpc BuyProduct (BuyProductRequest) returns (BuyProductResponse);
  rpc RequestStock (RequestStockRequest) returns (RequestStockResponse);

  rpc PrepareUpdatePrice (PrepareUpdatePriceRequest) returns (PrepareUpdatePriceResponse);
  rpc CommitUpdatePrice (CommitUpdatePriceRequest) returns (CommitUpdatePriceResponse);
  rpc AbortUpdatePrice (AbortUpdatePriceRequest) returns (AbortUpdatePriceResponse);

  rpc SendHeartbeat (HeartbeatRequest) returns (HeartbeatResponse);

  rpc Election (ElectionRequest) returns (ElectionResponse);
  rpc Elected (ElectedRequest) returns (ElectedResponse);  
}

message GetProductPriceRequest {
  int32 product_id = 1;
}

message GetProductPriceResponse {
  int32 product_id = 1;
  string name = 2;
  float price = 3;
  string message = 4;  // Error message if product is not found
}

message UpdateProductPriceRequest {
  int32 product_id = 1;
  float new_price = 2;
}

message UpdateProductPriceResponse {
  bool success = 1;
  string message = 2;  // Success or error message
}

message BuyProductRequest {
  int32 product_id = 1;
  int32 quantity = 2;
}

message BuyProductResponse {
  bool success = 1;
  int32 quantity_sold = 2;
  string message = 3;
}

message RequestStockRequest {
  int32 product_id = 1;
  int32 quantity = 2;
}

message RequestStockResponse {
  int32 quantity_provided = 1;
}

message PrepareUpdatePriceRequest {
  int32 product_id = 1;
  float new_price = 2;
  string transaction_id = 3;
  int32 version = 4;
}

message PrepareUpdatePriceResponse {
  bool ready = 1;
  string message = 2;
}

message CommitUpdatePriceRequest {
  string transaction_id = 1;
}

message CommitUpdatePriceResponse {
  bool success = 1;
}

message AbortUpdatePriceRequest {
  string transaction_id = 1;
}

message AbortUpdatePriceResponse {
  bool success = 1;
}

message HeartbeatRequest {
  int32 leader_id = 1;  
}

message HeartbeatResponse {
  bool success = 1;
  int32 follower_id = 2;
}

message ElectionRequest {
  int32 initiatior = 1;
}

message ElectionResponse {
  bool success = 1;
  int32 peer_id = 2;
}

message ElectedRequest {
  int32 new_leader_id = 1;
  int32 new_leader_host = 2;
  int32 new_leader_port = 3;
}

message ElectedResponse {
  bool success = 1;
}